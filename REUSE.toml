version = 1
SPDX-PackageName = "esp32p4-hal-testing"
SPDX-PackageSupplier = "Jinwoo Park <pmnxis@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/pmnxis/shiokko-probe-rs"

# Cargo.lock is auto-generated by Cargo. CC0 is the standard choice for
# auto-generated build artefacts so that REUSE lint passes without needing
# a per-file SPDX header.
[[annotations]]
path = ["Cargo.lock"]
precedence = "aggregate"
SPDX-FileCopyrightText = "© 2026 Jinwoo Park (pmnxis@gmail.com)"
SPDX-License-Identifier = "CC0-1.0"

# Log captures under target/ are build outputs, no header needed.
[[annotations]]
path = ["target/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "© 2026 Jinwoo Park (pmnxis@gmail.com)"
SPDX-License-Identifier = "CC0-1.0"
